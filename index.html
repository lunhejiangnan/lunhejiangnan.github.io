<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小小发明家·生活问题发现创意收集舱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", system-ui, sans-serif;
        }
        body {
            /* 参考图渐变背景：紫→红橙渐变 */
            background: linear-gradient(135deg, #2c1460 0%, #991a33 100%);
            min-height: 100vh;
            padding: 40px 16px;
            color: #fff;
        }
        .global-wrap {
            max-width: 1280px;
            margin: 0 auto;
        }
        /* 顶部标题区 */
        .header-block {
            text-align: center;
            margin-bottom: 40px;
        }
        .header-icon-group {
            font-size: 60px;
            margin-bottom: 12px;
        }
        .main-title {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #fff8cc;
            text-shadow: 0 0 12px #ffdd6666;
            margin-bottom: 16px;
        }
        .slogan-tag {
            display: inline-block;
            padding: 8px 28px;
            background: rgba(0,0,0,0.35);
            border-radius: 99px;
            font-size: 20px;
            color: #ffefaa;
        }
        /* 双栏主体布局 桌面端 */
        .main-row {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 28px;
        }
        /* 左侧表单卡片 */
        .form-card {
            background: rgba(255,255,255,0.92);
            border-radius: 20px;
            padding: 30px;
            color: #222;
        }
        .form-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 34px;
            color: #ff7733;
            margin-bottom: 28px;
            font-weight: bold;
            border-left: 10px solid #ff6622;
            padding-left: 14px;
        }
        /* 表格样式 */
        .table-box {
            border: 2px solid #b8d6f2;
            border-radius: 12px;
            overflow: hidden;
        }
        .table-row {
            display: grid;
            grid-template-columns: 220px 1fr;
            border-bottom: 1px solid #b8d6f2;
        }
        .table-row:last-child {
            border-bottom: none;
        }
        .row-label {
            background-color: #e0edfa;
            padding: 18px 16px;
            font-size: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            color: #113366;
        }
        .row-input {
            padding: 15px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            font-size: 18px;
            border: 1px solid #a9c8e8;
            border-radius: 8px;
            outline: none;
            background: #fafcff;
            transition: 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #3478d8;
            box-shadow: 0 0 0 3px rgba(52,120,216,0.2);
        }
        textarea {
            min-height: 90px;
            resize: vertical;
        }
        .inline-text {
            font-size: 18px;
            margin-bottom:8px;
            display:flex;
            align-items:center;
            gap:6px;
            flex-wrap: wrap;
        }
        .inline-text input {
            width: 180px;
        }
        /* 按钮区域 */
        .btn-group {
            margin-top: 28px;
            display: flex;
            gap: 18px;
            justify-content: center;
        }
        button {
            padding: 14px 36px;
            font-size: 19px;
            border: none;
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 500;
        }
        #submitBtn {
            background: linear-gradient(90deg,#3478d8,#4294f0);
            color: white;
            box-shadow: 0 4px 12px #3478d860;
        }
        #submitBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px #3478d880;
        }
        #resetBtn {
            background: #e8edf3;
            color: #333;
        }
        #resetBtn:hover {
            background: #d0dceb;
            transform: translateY(-2px);
        }
        /* 右侧侧边面板 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .panel-block {
            background: rgba(0,0,0,0.38);
            border-radius: 20px;
            padding: 26px;
        }
        .panel-title {
            text-align: center;
            font-size: 28px;
            color: #ffe888;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .tag-badge {
            display: inline-block;
            background: #ffbb33;
            color: #222;
            padding: 6px 16px;
            border-radius: 99px;
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 16px;
        }
        .category-tag {
            background: rgba(255,187,51,0.22);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 8px 0;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
        }
        .star-card {
            background: rgba(255,255,255,0.94);
            color: #222;
            border-radius: 14px;
            padding: 20px;
        }
        .star-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #992222;
        }
        .star-rating {
            color: #ffbb00;
            font-size: 22px;
            margin: 6px 0 12px;
        }
        .star-desc p {
            line-height: 1.6;
            font-size: 16px;
            margin: 4px 0;
        }
        /* 收集舱存档列表 */
        .record-list-wrap .item-card {
            background: rgba(255,255,255,0.95);
            color: #222;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .item-card p {
            line-height: 1.7;
            font-size: 16px;
            margin: 6px 0;
        }
        .empty-tip {
            text-align:center;
            color:#cccccc;
            padding:30px 0;
            font-size:17px;
        }

        /* ========== 手机适配媒体查询 ========== */
        @media screen and (max-width: 768px) {
            body {
                padding: 20px 12px;
            }
            .header-icon-group {
                font-size: 42px;
            }
            .main-title {
                font-size: 26px;
                letter-spacing: 1px;
            }
            .slogan-tag {
                font-size: 16px;
                padding: 6px 18px;
            }
            /* 双栏变单栏 */
            .main-row {
                grid-template-columns: 1fr;
            }
            /* 表单卡片缩小内边距 */
            .form-card {
                padding: 18px;
            }
            .form-title {
                font-size: 22px;
                border-left-width: 6px;
                padding-left: 10px;
                margin-bottom: 20px;
            }
            /* 表格行上下堆叠 */
            .table-row {
                grid-template-columns: 1fr;
            }
            .row-label {
                padding: 12px 14px;
                font-size: 16px;
            }
            .row-input {
                padding: 12px;
            }
            input, textarea, select {
                font-size: 16px;
                padding: 10px 12px;
            }
            .inline-text {
                font-size: 16px;
            }
            .inline-text input {
                width: 140px;
            }
            /* 按钮自适应换行 */
            .btn-group {
                flex-wrap: wrap;
            }
            button {
                padding: 12px 28px;
                font-size: 17px;
                flex: 1;
                min-width: 120px;
            }
            /* 侧边面板缩小 */
            .panel-block {
                padding: 18px;
            }
            .panel-title {
                font-size: 22px;
                letter-spacing: 1px;
            }
            .category-tag {
                font-size: 16px;
            }
            .star-card {
                padding: 16px;
            }
            .star-name {
                font-size: 19px;
            }
            .item-card p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
<div class="global-wrap">
    <!-- 顶部标题 -->
    <div class="header-block">
        <div class="header-icon-group">🤖 ✨ 🧠</div>
        <h1 class="main-title">小小发明家·奇思妙想收集舱</h1>
        <div class="slogan-tag">⭐ 每个烦恼都是一颗发明的种子 ⭐</div>
    </div>

    <div class="main-row">
        <!-- 左侧表单区 -->
        <div class="form-card">
            <h2 class="form-title">📝 递交你的发明蓝图</h2>
            <div class="table-box">
                <!-- 姓名行 -->
                <div class="table-row">
                    <div class="row-label">姓名 *</div>
                    <div class="row-input">
                        <input type="text" id="userName" placeholder="例如：李小乐">
                    </div>
                </div>
                <!-- 班级行 -->
                <div class="table-row">
                    <div class="row-label">班级 *</div>
                    <div class="row-input">
                        <input type="text" id="userClass" placeholder="例如：四（3）班">
                    </div>
                </div>
                <!-- 原有5行表格内容不变 -->
                <div class="table-row">
                    <div class="row-label">我发现的问题</div>
                    <div class="row-input">
                        <textarea id="problem" placeholder="请写下你在生活中发现的不便问题"></textarea>
                    </div>
                </div>
                <div class="table-row">
                    <div class="row-label">问题发生在哪里</div>
                    <div class="row-input">
                        <select id="place">
                            <option value="">请选择场景</option>
                            <option value="学习中">学习中</option>
                            <option value="家庭中">家庭中</option>
                            <option value="校园中">校园中</option>
                            <option value="社会生活中">社会生活中</option>
                        </select>
                    </div>
                </div>
                <div class="table-row">
                    <div class="row-label">最需要帮助的人</div>
                    <div class="row-input">
                        <input type="text" id="targetPerson" placeholder="例：老人、低年级同学、环卫工人">
                    </div>
                </div>
                <div class="table-row">
                    <div class="row-label">我的愿望</div>
                    <div class="row-input">
                        <div class="inline-text">要是有一个 <input type="text" id="inventNameShort" placeholder="物品名称"> 就好了，因为它可以</div>
                        <textarea id="inventFunc" placeholder="填写这个发明能解决什么困难、带来什么便利"></textarea>
                    </div>
                </div>
                <div class="table-row">
                    <div class="row-label">暂定发明名称</div>
                    <div class="row-input">
                        <input type="text" id="fullInventName" placeholder="给你的创意发明起完整名字">
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button id="submitBtn">存入收集舱</button>
                <button id="resetBtn">清空表单</button>
            </div>
        </div>

        <!-- 右侧 创意星河实验室 -->
        <div class="side-panel">
            <div class="panel-block">
                <h3 class="panel-title">✨ 创意星河实验室 ✨</h3>
                <span class="tag-badge">0个发明家</span>
                <div style="border-bottom:1px dashed #ffdd77; margin:12px 0 20px;"></div>
                <div class="category-tag">
                    <span>发明分类整合</span>
                </div>
                <div class="category-tag">
                    <span>🏠 生活妙招</span>
                    <span>0</span>
                </div>
            </div>

            <div class="panel-block">
                <h3 class="panel-title">⭐ 本周亮点发明家 ⭐</h3>
                <div class="star-card">
                    <div class="star-name">暂无上榜创意</div>
                    <div class="star-rating">☆☆☆☆☆</div>
                    <div class="star-desc">
                        <p>提交你的发明蓝图，登上本周榜单！</p>
                    </div>
                </div>
            </div>

            <!-- 收集舱存档记录 -->
            <div class="panel-block record-list-wrap">
                <h3 class="panel-title">📦 收集舱存档记录</h3>
                <div id="recordList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 全局统一：收集舱
    const STORAGE_KEY = "creativity_cabin_data";
    const recordWrap = document.getElementById("recordList");

    // 读取收集舱本地数据
    function loadCabinData() {
        let dataList = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        recordWrap.innerHTML = "";
        if(dataList.length === 0) {
            recordWrap.innerHTML = "<div class='empty-tip'>收集舱暂无创意记录<br>填写表单后提交保存</div>";
            return;
        }
        dataList.forEach((item, index) => {
            const html = `
                <div class="item-card">
                    <p><strong>创意序号${index+1}</strong></p>
                    <p><strong>提交人：</strong>${item.userName}｜${item.userClass}</p>
                    <p><strong>发现问题：</strong>${item.problem}</p>
                    <p><strong>发生场景：</strong>${item.place}</p>
                    <p><strong>需要帮助的人：</strong>${item.person}</p>
                    <p><strong>创意愿望：</strong>要是有一个${item.shortName}就好了，因为它可以${item.func}</p>
                    <p><strong>发明名称：</strong>${item.fullName}</p>
                    <p style="font-size:13px; color:#666;">存档时间：${item.saveTime}</p>
                </div>
            `;
            recordWrap.innerHTML += html;
        })
        // 更新右上角发明家数量 + 生活妙招统计
        document.querySelector(".tag-badge").innerText = `${dataList.length}个发明家`;
        document.querySelector(".category-tag:last-child span:last-child").innerText = dataList.length;
    }

    // 提交存入收集舱
    document.getElementById("submitBtn").addEventListener("click", function(){
        // 新增姓名、班级取值
        const userName = document.getElementById("userName").value.trim();
        const userClass = document.getElementById("userClass").value.trim();
        const problem = document.getElementById("problem").value.trim();
        const place = document.getElementById("place").value;
        const person = document.getElementById("targetPerson").value.trim();
        const shortName = document.getElementById("inventNameShort").value.trim();
        const func = document.getElementById("inventFunc").value.trim();
        const fullName = document.getElementById("fullInventName").value.trim();

        // 表单完整校验（姓名、班级设为必填）
        if(!userName || !userClass || !problem || !place || !person || !shortName || !func || !fullName) {
            alert("请完整填写姓名、班级及表格所有内容，再存入收集舱！");
            return;
        }

        let dataList = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        dataList.push({
            userName, userClass, problem, place, person, shortName, func, fullName,
            saveTime: new Date().toLocaleString()
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dataList));
        alert("已成功存入创意收集舱！");
        // 清空全部输入框
        document.querySelectorAll("textarea, input").forEach(el=>el.value="");
        document.querySelector("select").value = "";
        loadCabinData();
    })

    // 重置清空表单
    document.getElementById("resetBtn").addEventListener("click", function(){
        document.querySelectorAll("textarea, input").forEach(el=>el.value="");
        document.querySelector("select").value = "";
    })

    // 页面加载初始化
    window.onload = loadCabinData;
</script>
</body>
</html>
